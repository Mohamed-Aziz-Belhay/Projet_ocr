id: est_id
name: "Estonian ID Card"
version: "1.0"
description: "Template-driven extraction for Estonian ID card"
doc_family: id_document
pipeline: generic_template_v1
language_hints: [en]
preferred_engine: paddle
anchors_required:
  - SURNAME
  - GIVEN NAMES
  - ISIKUKOOD
  - SEX
fields:
  - name: surname
    extraction_method: regex
    patterns:
      - '(?:SURNAME|PEREKONNANIMI)\s*[:#]?\s*([A-ZÄÖÜÕ\- ]{2,60})'
    validation: {type: any, min_length: 2, max_length: 60}
    normalization: {strip: true, uppercase: true}
    required: true
  - name: given_names
    extraction_method: regex
    patterns:
      - '(?:GIVEN\s*NAMES|EESNIMI)\s*[:#]?\s*([A-ZÄÖÜÕ\- ]{2,80})'
    validation: {type: any, min_length: 2, max_length: 80}
    normalization: {strip: true, uppercase: true}
    required: true
  - name: personal_code
    extraction_method: regex
    patterns:
      - '(?:ISIKUKOOD|Personal\s*code)\s*[:#]?\s*(\d{11})'
    validation: {type: regex, pattern: '^\d{11}$'}
    normalization: {strip: true, remove_spaces: true}
    required: true
  - name: date_of_birth
    extraction_method: regex
    patterns:
      - '(?:Date\s*of\s*birth|Sunniaeg)\s*[:#]?\s*(\d{2}[./-]\d{2}[./-]\d{4})'
    validation: {type: any, min_length: 10, max_length: 10}
    normalization: {strip: true}
    required: true
  - name: sex
    extraction_method: regex
    patterns:
      - '(?:SEX|SUGU)\s*[:#]?\s*([MF])'
    validation: {type: enum, allowed_values: [M, F]}
    normalization: {strip: true, uppercase: true}
  - name: citizenship
    extraction_method: regex
    patterns:
      - '(?:CITIZENSHIP|KODAKONDSUS)\s*[:#]?\s*([A-Z ]{2,40})'
    validation: {type: any, min_length: 2, max_length: 40}
    normalization: {strip: true, uppercase: true}
  - name: document_number
    extraction_method: regex
    patterns:
      - '(?:CARD\s*NO|Document\s*No|KAARDI\s*NR)\s*[:#]?\s*([A-Z0-9]{6,15})'
    validation: {type: regex, pattern: '^[A-Z0-9]{6,15}$'}
    normalization: {strip: true, uppercase: true}
    required: true
  - name: date_of_expiry
    extraction_method: regex
    patterns:
      - '(?:Date\s*of\s*expiry|Kehtiv\s*kuni)\s*[:#]?\s*(\d{2}[./-]\d{2}[./-]\d{4})'
    validation: {type: any, min_length: 10, max_length: 10}
    normalization: {strip: true}
output_mapping:
  surname: surname
  given_names: givenNames
  personal_code: personalCode
  date_of_birth: birthDate
  sex: sex
  citizenship: citizenship
  document_number: documentNumber
  date_of_expiry: expiryDate
