id: receipt_generic
name: "Reçu / Ticket de caisse générique"
version: "1.0"
description: "Extraction pour reçus commerciaux, tickets de caisse, reçus de paiement"
doc_family: "receipt"
language_hints: ["fr", "ar", "en"]
preferred_engine: "tesseract"
anchors_required: []

fields:
  - name: numero_recu
    label: "Numéro de reçu"
    extraction_method: regex
    patterns:
      - "(?:Reçu|Ticket|Bon|Receipt)[\\s#N°:]+([A-Z0-9\\-]{3,20})"
      - "(?:N°|No\\.?|Ref)[\\s]*([A-Z0-9\\-]{3,20})"
    validation:
      type: any
      min_length: 2
    normalization:
      strip: true
      uppercase: true
    required: false
    output_key: "receipt_number"

  - name: date_recu
    label: "Date du reçu"
    extraction_method: regex
    patterns:
      - "(?:Date|Le)[\\s:]+([0-9]{1,2}[/\\-\\.][0-9]{1,2}[/\\-\\.][0-9]{2,4})"
      - "\\b(\\d{1,2}[/\\-\\.]\\d{1,2}[/\\-\\.]\\d{4})\\b"
    validation:
      type: date
      date_formats: ["%d/%m/%Y", "%d-%m-%Y", "%Y-%m-%d"]
    normalization:
      strip: true
    required: false
    output_key: "receipt_date"

  - name: heure
    label: "Heure"
    extraction_method: regex
    patterns:
      - "\\b([0-2]?[0-9]:[0-5][0-9](?::[0-5][0-9])?)\\b"
    validation:
      type: regex
      pattern: "[0-2]?[0-9]:[0-5][0-9].*"
    normalization:
      strip: true
    required: false
    output_key: "time"

  - name: montant_total
    label: "Montant total payé"
    extraction_method: regex
    patterns:
      - "(?:Total|Montant|Payé|Paid|TOTAL)[\\s:]+([0-9\\s.,]+)\\s*(?:DT|TND|EUR|€|\\$)?"
      - "([0-9]+[.,][0-9]{2,3})\\s*(?:DT|TND|EUR|€)"
    validation:
      type: number
    normalization:
      strip: true
      custom_replace:
        " ": ""
        ",": "."
    required: true
    output_key: "total_amount"
    confidence_weight: 2.0

  - name: mode_paiement
    label: "Mode de paiement"
    extraction_method: regex
    patterns:
      - "\\b(Espèces?|Cash|Carte|CB|Visa|Mastercard|Chèque|Virement|TPE)\\b"
    validation:
      type: enum
      allowed_values: ["Espèces", "Espèce", "Cash", "Carte", "CB", "Visa", "Mastercard", "Chèque", "Virement", "TPE"]
    normalization:
      strip: true
    required: false
    output_key: "payment_method"

  - name: commercant
    label: "Commerçant / Émetteur"
    extraction_method: anchor
    anchors:
      - text: "Magasin"
        required: false
      - text: "Établissement"
        required: false
      - text: "De:"
        required: false
    validation:
      type: any
      min_length: 2
    normalization:
      strip: true
    required: false
    output_key: "merchant"

  - name: devise
    label: "Devise"
    extraction_method: regex
    patterns:
      - "\\b(DT|TND|EUR|USD|MAD)\\b"
      - "([€$£])"
    validation:
      type: any
    normalization:
      strip: true
      uppercase: true
    required: false
    output_key: "currency"

postprocess_hooks:
  - normalize_dates

output_mapping:
  receipt_number: "receiptNumber"
  receipt_date: "receiptDate"
  time: "time"
  total_amount: "totalAmount"
  payment_method: "paymentMethod"
  merchant: "merchant"
  currency: "currency"
