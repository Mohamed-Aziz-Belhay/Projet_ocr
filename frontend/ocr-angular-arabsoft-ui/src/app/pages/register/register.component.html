<section class="login-page">
  <form class="login-card" (ngSubmit)="register()">
    <div class="login-brand">
      <img src="assets/Arabsoft_Logo.jpg" alt="Arabsoft" class="login-logo-img">
      <div>
        <span>Extract<span style="color: rgb(4, 47, 126);">LY</span></span>
        
      </div>
    </div>

    <h1>Créer un compte</h1>

    <p>
      Créez un compte utilisateur pour accéder à la plateforme OCR.
      Choisissez simple user ou demandez un accès operator.
    </p>

    <label>
      Nom complet
      <input
        [(ngModel)]="fullName"
        name="fullName"
        type="text"
        placeholder="Nom et prénom"
        autocomplete="name">
    </label>

    <label>
      Email professionnel
      <input
        [(ngModel)]="email"
        name="email"
        type="email"
        placeholder="utilisateur@arabsoft.com.tn"
        autocomplete="email">
    </label>

    <label class="account-type-label">
      Type de compte
      <select
        [(ngModel)]="requestedAccountType"
        name="requestedAccountType">
        <option value="simple_user">Simple user — extraction immédiate</option>
        <option value="operator">Operator — extraction avancée après validation admin</option>
      </select>

      <small class="field-help" *ngIf="requestedAccountType === 'operator'">
        Votre compte operator devra être validé par un administrateur avant utilisation.
      </small>

      <small class="field-help" *ngIf="requestedAccountType === 'simple_user'">
        Le simple user ne peut pas lancer d'extraction.
      </small>
    </label>

    <label>
      Mot de passe
      <div class="password-field">
        <input
          [(ngModel)]="password"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Minimum 8 caractères"
          autocomplete="new-password">
        <button
          class="eye-btn"
          type="button"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
          <ng-container *ngIf="showPassword; else registerPasswordHidden">
            <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
            <path d="M9.9 4.3A9.7 9.7 0 0 1 12 4c5 0 8.5 4.2 10 8a15.6 15.6 0 0 1-2.1 3.5"></path>
            <path d="M6.2 6.2A15.2 15.2 0 0 0 2 12c1.5 3.8 5 8 10 8a9.7 9.7 0 0 0 4.1-.9"></path>
          </svg>
          </ng-container>
          <ng-template #registerPasswordHidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          </ng-template>
        </button>
      </div>
    </label>

    <label>
      Confirmer le mot de passe
      <div class="password-field">
        <input
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Retapez le mot de passe"
          autocomplete="new-password">
        <button
          class="eye-btn"
          type="button"
          (click)="toggleConfirmPassword()"
          [attr.aria-label]="showConfirmPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
          <ng-container *ngIf="showConfirmPassword; else registerConfirmHidden">
            <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
            <path d="M9.9 4.3A9.7 9.7 0 0 1 12 4c5 0 8.5 4.2 10 8a15.6 15.6 0 0 1-2.1 3.5"></path>
            <path d="M6.2 6.2A15.2 15.2 0 0 0 2 12c1.5 3.8 5 8 10 8a9.7 9.7 0 0 0 4.1-.9"></path>
          </svg>
          </ng-container>
          <ng-template #registerConfirmHidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          </ng-template>
        </button>
      </div>
    </label>

    

    <div class="login-actions">
      <button class="btn-login" type="submit" [disabled]="loading">
        {{ loading ? 'Création…' : 'Créer le compte' }}
      </button>

      <a class="btn-clear" href="/login">Retour login</a>
    </div>

    <div class="login-message" [class.error]="error" *ngIf="message">
      {{ message }}
    </div>
  </form>
</section>
