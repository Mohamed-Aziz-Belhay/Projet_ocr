<section class="login-page">
  <form class="login-card" (ngSubmit)="login()">
    <div class="login-brand">
      <img src="assets/Arabsoft_Logo.jpg" alt="Arabsoft" class="login-logo-img">
      <div>
        <span>Extract<span style="color: rgb(4, 47, 126);">LY</span></span>
        
      </div>
    </div>

    <h1>Connexion</h1>

    <p>
      Accédez à notre plateforme OCR avec un compte sécurisé.
      
    </p>

    <div class="login-message" *ngIf="isLoggedIn && currentUserEmail">
      Session active : {{ currentUserEmail }}
    </div>

    <label>
      Email professionnel
      <input
        [(ngModel)]="email"
        name="email"
        type="email"
        placeholder="utilisateur@arabsoft.com.tn"
        autocomplete="email">
    </label>

    <label>
      Mot de passe
      <input
        [(ngModel)]="password"
        name="password"
        type="password"
        placeholder="••••••••"
        autocomplete="current-password"
        [type]="showPassword ? 'text' : 'password'">
        <button
          class="eye-btn"
          type="button"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
          <ng-container *ngIf="showPassword; else registerPasswordHidden">
            <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
            <path d="M9.9 4.3A9.7 9.7 0 0 1 12 4c5 0 8.5 4.2 10 8a15.6 15.6 0 0 1-2.1 3.5"></path>
            <path d="M6.2 6.2A15.2 15.2 0 0 0 2 12c1.5 3.8 5 8 10 8a9.7 9.7 0 0 0 4.1-.9"></path>
          </svg>
          </ng-container>
          <ng-template #registerPasswordHidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          </ng-template>
        </button>
    </label>

    

    <!--<label class="remember-line">
      <input [(ngModel)]="remember" name="remember" type="checkbox">
      Mémoriser la clé API localement
    </label>-->

    <div class="login-actions">
      <button class="btn-login" type="submit" [disabled]="loading">
        {{ loading ? 'Connexion…' : 'Se connecter' }}
      </button>

      <button class="btn-clear" type="button" (click)="clear()">
        Effacer
      </button>

      <button class="btn-clear" type="button" (click)="logout()" *ngIf="isLoggedIn">
        Déconnexion
      </button>
    </div>

    <p class="register-hint" style="margin-top: 3em;">
      Pas encore de compte ?
      <a href="/register">Créer un compte</a>
    </p>

    <p class="register-hint forgot-password-line">
      <button class="forgot-link"  routerLink="/forgot-password">
        Mot de passe oublié ?
      </button>
    </p>

    <div class="login-message" [class.error]="error" *ngIf="message">
      {{ message }}
    </div>
  </form>
</section>
