<section class="forgot-page">
  <form class="forgot-card" (ngSubmit)="codeSent ? resetPassword() : sendCode()">
    <div class="login-brand">
      <img src="assets/Arabsoft_Logo.jpg" alt="Arabsoft" class="login-logo-img">

      <div>
        <span>Extract<span style="color: rgb(4, 47, 126);">LY</span></span>
        
      </div>
    </div>

    <h1>Mot de passe oublié</h1>

    <p>
      Entrez votre email professionnel. Un code de vérification vous sera envoyé
      par mail. Ce code est valable pendant <strong>30 minutes</strong>.
    </p>

    <label>
      Email professionnel
      <input
        [(ngModel)]="email"
        name="email"
        type="email"
        placeholder="utilisateur@arabsoft.com.tn"
        autocomplete="email"
        [readonly]="codeSent">
    </label>

    <button
      class="btn-login"
      type="button"
      (click)="sendCode()"
      [disabled]="loading || codeSent">
      {{ loading && !codeSent ? 'Envoi du code…' : 'Envoyer le code' }}
    </button>

    <div class="reset-box" *ngIf="codeSent">
      <div class="timer-box">
        Code valable encore :
        <strong>{{ remainingTime }}</strong>
      </div>

      <label>
        Code de vérification
        <input
          [(ngModel)]="code"
          name="code"
          type="text"
          placeholder="Ex : 123456"
          maxlength="6">
      </label>

      <label>
        Nouveau mot de passe
        <input
          [(ngModel)]="newPassword"
          name="newPassword"
          type="password"
          placeholder="Nouveau mot de passe"
          autocomplete="new-password">
      </label>

      <label>
        Confirmer le mot de passe
        <input
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          type="password"
          placeholder="Confirmer le mot de passe"
          autocomplete="new-password">
      </label>

      <div class="reset-actions">
        <button class="btn-login" type="submit" [disabled]="loading">
          {{ loading ? 'Modification…' : 'Modifier le mot de passe' }}
        </button>

        <button class="btn-clear" type="button" (click)="resendCode()" [disabled]="loading">
          Renvoyer le code
        </button>
      </div>
    </div>

    <p class="register-hint">
      Vous avez déjà un compte ?
      <a routerLink="/login">Retour à la connexion</a>
    </p>

    <div class="login-message" [class.error]="error" *ngIf="message">
      {{ message }}
    </div>
  </form>
</section>
